pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: ROOT="$(git rev-parse --show-toplevel)" && "$ROOT/scripts/with-node-path.sh" "$ROOT/node_modules/.bin/eslint" {staged_files}
    types:
      glob: "*.{js,ts, jsx, tsx}"
      run: ROOT="$(git rev-parse --show-toplevel)" && "$ROOT/scripts/with-node-path.sh" "$ROOT/node_modules/.bin/tsc"
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: ROOT="$(git rev-parse --show-toplevel)" && "$ROOT/scripts/with-node-path.sh" "$ROOT/node_modules/.bin/commitlint" --edit {1}
